name: Deploy to GitHub Pages

# Builds the app as a fully static site and publishes it to GitHub Pages.
# Enable once in the repo: Settings → Pages → Build and deployment → Source:
# "GitHub Actions".
#
# Optional cloud sync: add repository secrets NEXT_PUBLIC_SUPABASE_URL and
# NEXT_PUBLIC_SUPABASE_ANON_KEY (Settings → Secrets and variables → Actions).
# Optional on-device speech model on a CDN: add a repository variable
# NEXT_PUBLIC_VOSK_MODEL_URL. All are safe to leave unset.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel older in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        env:
          BUILD_TARGET: pages
          # Project Pages are served under /<repo>/. For a user/org page
          # (<user>.github.io) or a custom domain, set this to an empty string.
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_VOSK_MODEL_URL: ${{ vars.NEXT_PUBLIC_VOSK_MODEL_URL }}
        run: npm run build:pages

      - name: Disable Jekyll (so _next assets are served)
        run: touch out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
